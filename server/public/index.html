<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm OK portal</title>
</head>

<body>
    <h2>Welcome to I'm OK!</h2>
    <h3>This portal allows users who are connect to send messages to loved ones without Internet.</h2> 
    <h3>Send a Message</h3>

    <form method="POST" action="/submit">
        <label>Recipient Email</label><br>
        <input type="email" name="email" required maxlength="254"><br><br>

        <label>Message (max 100 characters)</label><br>
        <textarea name="message" required maxlength="100"></textarea><br><br>
        <div id="counter">0/100</div>

        <button type="submit">Submit</button>
    </form>

    <script src="index.js"></script>
    <script>
        const textarea = document.getElementById("message");
        const counter = document.getElementById("counter");

        textarea.addEventListener("input", () => {
          counter.textContent = `${textarea.value.length}/100`;
        });
    </script>
</body>

</html>
